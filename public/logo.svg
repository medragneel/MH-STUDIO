<svg id="Layer_2" data-name="Layer 2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 324.65 372.04">
  <defs>
    <style>
      /* ── Adaptive color tokens ── */
      :root {
        --logo-text:   #0b0c0b;   /* dark on light bg  */
        --logo-bars:   #0b0c0b;
        --logo-icon:   #7e7eed;   /* purple — stays same both modes */
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --logo-text:  #f0efff;
          --logo-bars:  #f0efff;
          --logo-icon:  #9390df;  /* slightly brighter purple on dark */
        }
      }

      .cls-1 {
        letter-spacing: 0em;
      }

      .cls-2 {
        font-family: ProductDesign-Regular, 'Product Design';
        font-size: 50px;
      }

      .cls-3 {
        letter-spacing: -.01em;
      }

      .cls-4 {
        letter-spacing: 0em;
      }

      .cls-5 {
        fill: #7e7eed;
      }

      .cls-5, .cls-6 {
        stroke-width: 0px;
      }

      .cls-6 {
        fill: #0b0c0b;
      }

      .cls-7 {
        letter-spacing: 0em;
      }

      .cls-8 {
        letter-spacing: .02em;
      }

      .cls-9 {
        letter-spacing: 0em;
      }
      /* ── Shape fills ── */
      .cls-2 {
        fill: var(--logo-text);
        stroke-width: 0px;
        transition: fill 0.3s ease;
      }
      .cls-5 {
        fill: var(--logo-icon);
        stroke-width: 0px;
        transition: fill 0.3s ease;
      }
      .cls-6 {
        fill: var(--logo-bars);
        stroke-width: 0px;
        transition: fill 0.3s ease;
      }

    </style>
  </defs>
